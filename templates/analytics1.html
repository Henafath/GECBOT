<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analytics</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard-container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>GECBot</h2>
        <ul>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/all_questions">All Questions</a></li>
            <li><a href="/analytics">Analytics</a></li>
            <li><a href="/logout">Logout</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <header class="header">
            <h1>Analytics</h1>
            <p>Insights and statistics 📊</p>
        </header>

        <!-- Cards -->
        <section class="cards">

            <div class="card">
                <h3>Total Questions</h3>
                <p>120</p>
            </div>

            <div class="card">
                <h3>Answered</h3>
                <p>90</p>
            </div>

            <div class="card">
                <h3>Unanswered</h3>
                <p>30</p>
            </div>

        </section>

        <!-- Chart -->
        <section class="chart-section">
            <h2>Daily Question Count</h2>
            <canvas id="myChart"></canvas>
        </section>

    </main>

</div>

<script>
const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
        datasets: [{
            label: 'Questions',
            data: [10, 15, 8, 20, 18, 25],
            borderWidth: 3,
            tension: 0.4
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                display: true
            }
        }
    }
});
</script>

</body>
</html>
